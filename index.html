<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna’s Cotillón</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Noto Sans KR', sans-serif;
background:#f4ede4;
overflow:hidden;
}

/* CONTENEDOR INICIO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* TÍTULO */
h1{
font-size:60px;
letter-spacing:8px;
font-weight:300;
animation:fadeIn 1.5s ease forwards;
opacity:0;
}

.sub{
color:#666;
margin-top:20px;
animation:fadeIn 2s ease forwards;
opacity:0;
}

/* BOTONES */
.button{
padding:18px 45px;
margin:15px;
border-radius:30px;
background:#d8b4f8;
color:white;
text-decoration:none;
font-size:16px;
transition:0.3s;
display:inline-block;
}

.button:hover{
opacity:0.8;
}

/* GLOBOS */
.balloon{
position:absolute;
width:70px;
height:90px;
border-radius:50%;
opacity:0.6;
animation:float 6s ease-in-out infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:40px;
background:#ccc;
left:50%;
top:90px;
}

.pink{ background:#f9a8d4; left:10%; bottom:-100px; animation-duration:8s;}
.purple{ background:#e9d5ff; right:15%; bottom:-120px; animation-duration:6s;}
.green{ background:#bbf7d0; left:70%; bottom:-140px; animation-duration:7s;}

@keyframes float{
0%{ transform:translateY(0);}
50%{ transform:translateY(-40px);}
100%{ transform:translateY(0);}
}

@keyframes fadeIn{
to{ opacity:1;}
}
</style>
</head>

<body>

<div class="hero">

<!-- Globos animados -->
<div class="balloon pink"></div>
<div class="balloon purple"></div>
<div class="balloon green"></div>

<h1>LUNA’S COTILLÓN</h1>
<div class="sub">Decoración · Personalizados · Globos</div>

<br><br>

<a href="personalizados.html" class="button">Ver Personalizados</a>
<a href="globos.html" class="button">Ver Catálogo de Globos</a>

</div>

</body>
</html>
