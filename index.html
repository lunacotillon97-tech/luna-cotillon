<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna’s Cotillón</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat', sans-serif;
background:#837bb9;
color:#fdf4e5;
overflow:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

/* TÍTULO */
h1{
font-family:'Playfair Display', serif;
font-size:70px;
letter-spacing:4px;
margin:0;
animation:fadeIn 1.5s ease forwards;
opacity:0;
}

.sub{
margin-top:15px;
letter-spacing:3px;
font-size:14px;
opacity:0;
animation:fadeIn 2.5s ease forwards;
}

/* BOTONES */
.button{
margin-top:30px;
padding:16px 40px;
border-radius:40px;
background:#342e57;
color:#fdf4e5;
text-decoration:none;
transition:0.3s;
font-size:14px;
letter-spacing:2px;
}

.button:hover{
background:#fdf4e5;
color:#342e57;
}

/* ESTRELLAS */
.star{
position:absolute;
color:#fdf4e5;
font-size:20px;
animation:twinkle 3s infinite alternate;
}

.star1{ top:15%; left:20%; }
.star2{ top:25%; right:15%; }
.star3{ bottom:20%; left:30%; }
.star4{ bottom:15%; right:25%; }

/* LUNA */
.moon{
position:absolute;
top:10%;
right:10%;
font-size:60px;
opacity:0.3;
}

/* GLOBOS */
.balloon{
position:absolute;
width:60px;
height:80px;
border-radius:50%;
opacity:0.4;
animation:float 6s ease-in-out infinite;
}

.pink{ background:#fdf4e5; left:10%; bottom:10%; }
.purple{ background:#342e57; right:15%; bottom:15%; animation-duration:7s; }

@keyframes float{
0%{ transform:translateY(0); }
50%{ transform:translateY(-30px); }
100%{ transform:translateY(0); }
}

@keyframes twinkle{
0%{ opacity:0.3; }
100%{ opacity:1; }
}

@keyframes fadeIn{
to{ opacity:1; }
}
</style>
</head>

<body>

<div class="hero">

<div class="moon">🌙</div>

<div class="star star1">✦</div>
<div class="star star2">✦</div>
<div class="star star3">✦</div>
<div class="star star4">✦</div>

<div class="balloon pink"></div>
<div class="balloon purple"></div>

<h1>Luna’s Cotillón</h1>
<div class="sub">Decoración · Personalizados · Globos</div>

<a href="personalizados.html" class="button">Ver Personalizados</a>
<a href="globos.html" class="button">Ver Catálogo de Globos</a>

</div>

</body>
</html>
